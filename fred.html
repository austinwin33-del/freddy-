<html>
<head>
<title>Fred</title>

<style>
body{
    font-family:'Segoe UI', Roboto, Arial, sans-serif;
    background-color:#eef5ff;
    margin:0;
    padding:0;
    color:#1e3a8a;
}

.top-bar{
    display:flex;
    justify-content:flex-end;
    align-items:center;
    flex-wrap:wrap;
    gap:12px;
    padding:18px 18px 0;
}

.nav-button{
    display:inline-block;
    padding:12px 20px;
    border-radius:999px;
    background-color:#ffffff;
    border:3px solid #1d4ed8;
    color:#1d4ed8;
    text-decoration:none;
    font-weight:700;
    box-shadow:0 10px 24px rgba(29, 78, 216, 0.25);
}

.nav-button:hover{
    background-color:#dbeafe;
}

header{
    background-color:#1e3a8a;
    color:white;
    text-align:center;
    padding:30px;
}

.container{
    max-width:760px;
    margin:30px auto;
    padding:0 20px;
    text-align:center;
}

.card{
    background:white;
    border:2px solid #bfdbfe;
    border-radius:18px;
    padding:28px;
    box-shadow:0 12px 30px rgba(30, 58, 138, 0.12);
}

.slider{
    position:relative;
    max-width:100%;
}

.slider-frame{
    overflow:hidden;
    border-radius:16px;
    border:2px solid #dbeafe;
    background:#f8fbff;
}

.slides{
    display:flex;
    transition:transform 0.35s ease;
}

.slide{
    width:100%;
    flex:0 0 100%;
}

.slides img,
.slides iframe{
    width:100%;
    height:360px;
    display:block;
}

.slides img{
    object-fit:cover;
}

.slides iframe{
    border:0;
}

.slider-button{
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    width:46px;
    height:46px;
    border:none;
    border-radius:50%;
    background:rgba(30, 58, 138, 0.88);
    color:white;
    font-size:26px;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow:0 8px 20px rgba(30, 58, 138, 0.2);
    z-index:3;
}

.slider-button:hover{
    background:rgba(29, 78, 216, 0.95);
}

.slider-button.prev{
    left:12px;
}

.slider-button.next{
    right:12px;
}

.slider-caption{
    margin:16px 0 0;
    font-size:1rem;
    font-weight:600;
}

@media (max-width:600px){
    .card{
        padding:18px;
    }

    .slides img,
    .slides iframe{
        height:240px;
    }

    .slider-button{
        width:40px;
        height:40px;
        font-size:22px;
    }
}
</style>
</head>

<body>
<div class="top-bar">
<a class="nav-button" href="is201.html">Home</a>
<a class="nav-button" href="aboutme.html">About Me</a>
<a class="nav-button" href="fred.html">Fred Zone</a>
</div>

<header>
<h1>Fred</h1>
</header>

<div class="container">
<div class="card">
<div class="slider" aria-label="Fred photo slide deck">
<button class="slider-button prev" type="button" aria-label="Previous photo">&#8634;</button>
<div class="slider-frame">
<div class="slides" id="fred-slides">
<div class="slide"><img src="https://cdn.ebaumsworld.com/mediaFiles/picture/2265415/87405967.jpg" alt="Fred slide 1"></div>
<div class="slide"><img src="https://tse1.mm.bing.net/th/id/OIP.I2L0UTOA1yHUENBa7QxUNwHaFx?rs=1&pid=ImgDetMain&o=7&rm=3" alt="Fred slide 2"></div>
<div class="slide"><img src="https://tse1.mm.bing.net/th/id/OIP.Snb63JqH17QI4602MnPaoAHaEK?rs=1&pid=ImgDetMain&o=7&rm=3" alt="Fred slide 3"></div>
<div class="slide"><iframe width="560" height="315" src="https://www.youtube.com/embed/dQw4w9WgXcQ?si=kQFGwSkvmvDxQ7sg" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe></div>
</div>
</div>
<button class="slider-button next" type="button" aria-label="Next photo">&#8635;</button>
</div>
<p class="slider-caption" id="fred-caption">Photo 1 of 4</p>
</div>
</div>
<script>
const slides = document.getElementById('fred-slides');
const slideItems = slides.querySelectorAll('.slide');
const caption = document.getElementById('fred-caption');
const prevButton = document.querySelector('.slider-button.prev');
const nextButton = document.querySelector('.slider-button.next');
let currentSlide = 0;

function renderSlide() {
    slides.style.transform = `translateX(-${currentSlide * 100}%)`;
    caption.textContent = `Photo ${currentSlide + 1} of ${slideItems.length}`;
}

prevButton.addEventListener('click', function () {
    currentSlide = (currentSlide - 1 + slideItems.length) % slideItems.length;
    renderSlide();
});

nextButton.addEventListener('click', function () {
    currentSlide = (currentSlide + 1) % slideItems.length;
    renderSlide();
});

renderSlide();
</script>
</body>
</html>
